---
# Pushover alerting is optional — remove the `alerting`/`alerts` blocks below
# if you don't use Pushover, or leave PUSHOVER_TOKEN/PUSHOVER_USER_KEY unset
# and gatus will just skip sending alerts.
alerting:
  pushover:
    application-token: ${PUSHOVER_TOKEN}
    default-alert:
      description: health-check failed
      failure-threshold: 3
      minimum-reminder-interval: 1h
      send-on-resolved: true
      success-threshold: 2
    priority: 1
    resolved-priority: 0
    title: Gatus
    user-key: ${PUSHOVER_USER_KEY}

endpoints:
  - name: towonel hub
    group: home
    url: https://${REMOTE_STATUS_HOSTNAME}/v1/health
    interval: 1m
    ui:
      hide-url: true
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover

storage:
  type: sqlite
  caching: true
  path: ${GATUS_CONFIG_PATH}/gatus.db

ui:
  title: Status | Gatus
  header: Status

web:
  port: ${GATUS_WEB_PORT}
