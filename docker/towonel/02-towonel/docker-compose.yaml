---
name: towonel

services:
  towonel-hub:
    image: codeberg.org/towonel/towonel-node:1.0.1
    container_name: towonel-hub
    restart: unless-stopped
    user: "10001:10001"
    environment:
      RUST_LOG: info
      TOWONEL_INVITE_HASH_KEY: ${TOWONEL_INVITE_HASH_KEY}
      TOWONEL_HUB_ENABLED: "true"
      TOWONEL_HUB_PUBLIC_URL: https://hub.econline.nl
      TOWONEL_EDGE_ENABLED: "true"
      TOWONEL_EDGE_LISTEN_ADDR: 0.0.0.0:4443
      TOWONEL_EDGE_ADVERTISED_ADDRESSES: hub.econline.nl:443
      TOWONEL_EDGE_PROXY_PROTOCOL: "true"
      TOWONEL_EDGE_IROH_PORT: "51820"
    expose:
      - "4443"
      - "8443"
    ports:
      - "51820:51820/udp"
    volumes:
      - towonel-data:/data
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "-o"
        - "/dev/null"
        - "http://127.0.0.1:8443/v1/health"
      interval: 30s
      timeout: 5s
      start_period: 30s

volumes:
  towonel-data:

networks:
  default:
    name: edge
