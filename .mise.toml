[env]
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = "{{config_root}}/talosconfig"
JUST_UNSTABLE = "1"
LEFTHOOK_OUTPUT = "false"

_.file = [
  "{{config_root}}/.secrets.env",
]

[tools]
"python" = "3.14.6"
"pipx:flux-local" = "8.4.0"
"pipx:makejinja" = "2.8.2"
"aqua:budimanjojo/talhelper" = "3.1.15"
"aqua:casey/just" = "1.57.0"
"aqua:cilium/cilium-cli" = "0.19.6"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:cli/cli" = "2.96.0"
"aqua:cloudflare/cloudflared" = "2026.7.2"
"aqua:cue-lang/cue" = "0.17.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.2"
"aqua:getsops/sops" = "3.13.2"
"aqua:go-task/task" = "3.52.0"
"aqua:helm/helm" = "4.2.3"
"aqua:helmfile/helmfile" = "1.7.1"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.3"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:mitsuhiko/minijinja" = "2.21.0"
"aqua:siderolabs/talos" = "1.13.7"
"aqua:yannh/kubeconform" = "0.8.0"
"aqua:derailed/k9s" = "0.51.0"
"aqua:google/yamlfmt" = "0.21.0"
"aqua:evilmartians/lefthook" = "2.1.10"
"github:home-operations/flate" = "v0.4.12"

[hooks]
postinstall = "lefthook install"
