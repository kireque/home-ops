---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${APP}
  annotations:
    # dataSourceRef is immutable once the PVC is bound, and Flux prunes any
    # resource it previously managed that later disappears from the render
    # output. This PVC was originally provisioned by volsync (see the
    # dataSourceRef below) and must keep declaring that exact same value
    # forever, even after volsync itself is decommissioned - changing or
    # omitting it is rejected by the API as an immutable-field mutation.
    # prune is also disabled here as a defense-in-depth safety net so a
    # future edit that drops this file can't accidentally delete real data.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ${KOPIUR_ACCESSMODES:=ReadWriteOnce}
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: ${APP}-dst
  resources:
    requests:
      storage: ${KOPIUR_CAPACITY:=5Gi}
  storageClassName: ${KOPIUR_STORAGECLASS:=ceph-block}
