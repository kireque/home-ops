---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${APP}
  annotations:
    # Statically bound (spec.volumeName) directly to a specific pre-existing
    # PV after a manual recovery, not dynamically provisioned - no
    # dataSourceRef. volumeName must be declared explicitly (via
    # KOPIUR_VOLUMENAME, set per-app in that app's ks.yaml postBuild) even
    # though it never changes: Flux's apply computes the full desired PVC
    # object, so omitting an already-set field here makes it try to clear
    # it back to empty, which the API rejects as an immutable-field change
    # exactly like dataSourceRef.
    # prune is disabled as a defense-in-depth safety net, same reasoning as
    # kopiur/adopt.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ${KOPIUR_ACCESSMODES:=ReadWriteOnce}
  resources:
    requests:
      storage: ${KOPIUR_CAPACITY:=5Gi}
  storageClassName: ${KOPIUR_STORAGECLASS:=ceph-block}
  volumeName: ${KOPIUR_VOLUMENAME}
