---
# TODO: add schema
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: ha-mcp-gladius
spec:
  env:
    - name: HOMEASSISTANT_URL
      value: http://home-assistant-gladius.home-automation.svc.cluster.local:8123
  groupRef:
    name: mcp-tools
  image: ghcr.io/homeassistant-ai/ha-mcp:7.5.0
  podTemplateSpec:
    spec:
      containers:
        - name: toolhive
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
        - name: mcp
          command:
            - ha-mcp-web
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  secrets:
    - name: ha-mcp-gladius-secret
      key: HOMEASSISTANT_TOKEN
  transport: streamable-http
