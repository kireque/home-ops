---
# TODO: add schema
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: ha-mcp-gladius
spec:
  env:
    - name: HOMEASSISTANT_URL
      value: http://home-assistant-gladius.home-automation.svc.cluster.local:8123
  groupRef:
    name: mcp-tools
  image: ghcr.io/homeassistant-ai/ha-mcp:7.5.0
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - ha-mcp-web
  secrets:
    - name: ha-mcp-gladius-secret
      key: HOMEASSISTANT_TOKEN
  transport: streamable-http
