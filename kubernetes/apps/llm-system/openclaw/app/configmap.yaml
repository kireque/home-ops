---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config-template
data:
  openclaw.json: |-
    {
      "gateway": {
        "auth": {
          "mode": "token",
          "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        },
        "bind": "auto",
        "mode": "local",
        "controlUi": {
          "allowInsecureAuth": true,
          "allowedOrigins": ["https://openclaw.econline.nl"]
        },
        "http": {
          "endpoints": {
            "chatCompletions": {
              "enabled": true
            }
          }
        },
        "port": 18789,
        "trustedProxies": ["10.0.0.0/8"]
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "azure/model-router",
            "fallbacks": [
              "azure/gpt-5.4-pro",
              "azure/gpt-5.4",
              "azure/grok-4-20-reasoning"
            ]
          },
          "models": {
            "azure/model-router": { "alias": "Model Router" },
            "azure/gpt-5.4-pro": { "alias": "GPT-5.4 Pro" },
            "azure/gpt-5.4": { "alias": "GPT-5.4" },
            "azure/grok-4-20-reasoning": { "alias": "Grok 4 Reasoning" }
          }
        }
      },
      "mcp": {
        "servers": {
          "mcp-gateway": {
            "transport": "streamable-http",
            "url": "http://vmcp-mcp-gateway.llm-system.svc.cluster.local:4483"
          }
        }
      },
      "auth": {
        "profiles": {
          "azure:default": {
            "provider": "azure",
            "mode": "api_key"
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "azure": {
            "api": "openai-completions",
            "apiKey": "{{ .AZURE_OPENAI_API_KEY }}",
            "baseUrl": "{{ .OPENAI_BASE_URL }}",
            "models": [
              {
                "id": "model-router",
                "name": "Model Router",
                "reasoning": true,
                "input": ["text", "image"],
                "contextWindow": 272000,
                "maxTokens": 128000
              },
              {
                "id": "gpt-5.4-pro",
                "name": "GPT-5.4 Pro",
                "reasoning": true,
                "input": ["text", "image"],
                "contextWindow": 272000,
                "maxTokens": 128000
              },
              {
                "id": "gpt-5.4",
                "name": "GPT-5.4",
                "reasoning": true,
                "input": ["text", "image"],
                "contextWindow": 272000,
                "maxTokens": 128000
              },
              {
                "id": "grok-4-20-reasoning",
                "name": "Grok 4 Reasoning",
                "reasoning": true,
                "input": ["text"],
                "contextWindow": 131072,
                "maxTokens": 65536
              }
            ]
          }
        }
      }
    }
