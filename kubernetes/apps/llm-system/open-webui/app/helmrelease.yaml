---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.2
            env:
              OLLAMA_BASE_URL: http://ollama.llm-system.svc.cluster.local:11434
              OPENAI_API_BASE_URL: https://econline-foundry.services.ai.azure.com/openai/v1
              WEBUI_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: WEBUI_SECRET_KEY
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: AZURE_OPENAI_API_KEY
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        fsGroup: 0
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - chat.econline.nl
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: open-webui
        globalMounts:
          - path: /app/backend/data
