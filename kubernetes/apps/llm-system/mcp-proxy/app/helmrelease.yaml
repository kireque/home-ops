---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-proxy
spec:
  chartRef:
    kind: OCIRepository
    name: mcp-proxy
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      mcp-proxy:
        initContainers:
          render-config:
            image:
              repository: busybox
              tag: 1.37.0
            command:
              - /bin/sh
              - -c
              - URL=$(cat /secrets/MCP_SECRET_PATH) && sed "s|HA_MCP_SECRET_PATH|$URL|g" /template/config.json.tmpl > /config/config.json
        containers:
          app:
            image:
              repository: ghcr.io/tbxark/mcp-proxy
              tag: v0.43.2
            args:
              - --config=/config/config.json
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 9090
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
    persistence:
      config-template:
        type: configMap
        name: mcp-proxy-config-template
        globalMounts:
          - path: /template
            readOnly: true
      config:
        type: emptyDir
        globalMounts:
          - path: /config
      ha-mcp-secret:
        type: secret
        name: mcp-proxy-secret
        globalMounts:
          - path: /secrets
            readOnly: true
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - mcp.econline.nl
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
