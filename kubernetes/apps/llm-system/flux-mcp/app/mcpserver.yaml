---
# TODO: add schema
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: flux-mcp
spec:
  args:
    - serve
    - --transport=http
    - --port=9090
  groupRef:
    name: mcp-tools
  image: ghcr.io/controlplaneio-fluxcd/flux-operator-mcp:v0.49.0@sha256:eb6034a4c65631df99e68ddcd6d57614bcf6fcd6f49682788e3dc279d91bff17
  mcpPort: 9090
  podTemplateSpec:
    spec:
      containers:
        - name: toolhive
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
        - name: mcp
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: temp
              mountPath: /tmp
      serviceAccountName: flux-mcp
      volumes:
        - name: temp
          emptyDir: {}
  transport: streamable-http
