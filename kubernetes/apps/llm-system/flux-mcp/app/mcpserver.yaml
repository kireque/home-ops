---
# TODO: add schema
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: flux-mcp
spec:
  args:
    - serve
    - --transport=http
    - --port=9090
  groupRef:
    name: mcp-tools
  image: ghcr.io/controlplaneio-fluxcd/flux-operator-mcp:v0.54.1@sha256:b0d648eefa9b44b10b97f419ae3573d81aaeab59f034d986d3f8282113dc03a5
  mcpPort: 9090
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: temp
              mountPath: /tmp
      serviceAccountName: flux-mcp
      volumes:
        - name: temp
          emptyDir: {}
  transport: streamable-http
