---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-database
spec:
  chartRef:
    kind: OCIRepository
    name: immich-database
  interval: 1h
  values:
    controllers:
      postgres:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/postgres
              tag: 16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
            env:
              PGDATA: /var/lib/postgresql/data/pgdata
              POSTGRES_INITDB_ARGS: --data-checksums
            envFrom:
              - secretRef:
                  name: immich-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
      valkey:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: valkey/valkey
              tag: 9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
            args:
              - --save
              - ""
              - --appendonly
              - "no"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi
    service:
      postgres:
        controller: postgres
        ports:
          db:
            port: 5432
      valkey:
        controller: valkey
        ports:
          cache:
            port: 6379
    persistence:
      data:
        existingClaim: immich-database
        advancedMounts:
          postgres:
            app:
              - path: /var/lib/postgresql/data
      dshm:
        type: emptyDir
        medium: Memory
        sizeLimit: 256Mi
        advancedMounts:
          postgres:
            app:
              - path: /dev/shm
      valkey-data:
        type: emptyDir
        advancedMounts:
          valkey:
            app:
              - path: /data
