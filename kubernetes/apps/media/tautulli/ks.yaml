---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tautulli
spec:
  components:
    - ../../../../components/kopiur/adopt-static
    - ../../../../components/kopiur/backup
    - ../../../../components/nfs-scaler
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/tautulli/app
  postBuild:
    substitute:
      APP: tautulli
      KOPIUR_VOLUMENAME: pvc-615d53b9-623f-4256-aeb0-284acf4c3572
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
