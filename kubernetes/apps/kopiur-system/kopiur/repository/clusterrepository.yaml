---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  allowedNamespaces:
    all: true
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: gladius.home.econline.nl
          path: /mnt/tank/backup/kopiur
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-nas-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  moverDefaults:
    cache:
      capacity: 1Mi
      mode: Ephemeral
      storageClassName: openebs-hostpath
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    scratch:
      capacity: 1Mi
      storageClassName: openebs-hostpath
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    ttlSecondsAfterFinished: 300
  scheduleDefaults:
    timezone: Europe/Amsterdam
  server:
    auth:
      insecure:
        acknowledgeInsecure: true
    namespace: kopiur-system
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    readOnly: true
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
